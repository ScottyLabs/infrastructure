name: Update flake inputs
on:
  workflow_dispatch:
    inputs:
      input_name:
        description: 'Which flake input to update (or "all")'
        required: false
        default: 'all'
        type: string

jobs:
  update:
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v27

      - name: Update flake
        run: |
          set -u
          if [ "${{ inputs.input_name }}" = "all" ]; then
            args=()
          else
            args=("${{ inputs.input_name }}")
          fi
          # Codeberg occasionally returns 5xx for git fetches; nix has no built-in retry
          # and leaves a half-populated ~/.cache/nix/gitv3 entry that breaks subsequent
          # attempts with "revspec 'refs/heads/main' not found". Wipe between tries.
          for attempt in 1 2 3 4 5; do
            rm -rf "$HOME/.cache/nix/gitv3"
            if nix flake update "${args[@]}"; then
              exit 0
            fi
            delay=$((10 * attempt))
            echo "::warning::flake update attempt $attempt failed; retrying in ${delay}s"
            sleep "$delay"
          done
          echo "::error::flake update failed after 5 attempts"
          exit 1

      - name: Commit and push
        run: |
          echo "${{ secrets.BOT_SSH_SIGNING_KEY }}" > /tmp/signing_key
          chmod 600 /tmp/signing_key

          git config user.name "scottylabs-bot"
          git config user.email "ops+codeberg@scottylabs.org"
          git config gpg.format ssh
          git config user.signingkey /tmp/signing_key
          git config commit.gpgsign true

          git add flake.lock
          git diff --cached --quiet || git commit -m "chore: update ${{ inputs.input_name }}"
          git push
